# =============================================================================
#  WaCalls - Deploy production (Dokploy/Traefik)
#  Dominio: wacalls.atozsolutions.xyz
# =============================================================================
version: "3.8"

services:
  wacalls:
    build:
      context: /opt/wacalls
      dockerfile: Dockerfile
    container_name: wacalls
    restart: unless-stopped

    volumes:
      - wacalls_data:/data
      - wacalls_media:/app/media

    environment:
      - TZ=America/Sao_Paulo
      - WACALLS_ALLOWED_ORIGINS=https://wacalls.atozsolutions.xyz

    networks:
      - dokploy-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wacalls.rule=Host(`wacalls.atozsolutions.xyz`)"
      - "traefik.http.routers.wacalls.entrypoints=websecure"
      - "traefik.http.routers.wacalls.tls=true"
      - "traefik.http.routers.wacalls.tls.certresolver=letsencrypt"
      - "traefik.http.services.wacalls.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  wacalls_data:
    name: wacalls_data
  wacalls_media:
    name: wacalls_media

networks:
  dokploy-network:
    external: true
